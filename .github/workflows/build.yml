name: Build Releases

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name CursorPicker cursor_picker.py

      - name: Upload Release Asset
        run: gh release upload ${{ github.ref_name }} dist/CursorPicker.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install PyInstaller and AppImage tools
        run: pip install pyinstaller appimage

      - name: Build AppImage
        run: |
          pyinstaller --onefile --windowed --name CursorPicker cursor_picker.py
          python -m appimage dist/CursorPicker -s --icon="" -o

      - name: Upload Release Asset
        run: gh release upload ${{ github.ref_name }} CursorPicker-*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
